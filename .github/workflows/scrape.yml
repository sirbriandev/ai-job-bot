name: AI Job Scraper Automation

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch:      # Allows manual trigger via the Actions tab

# Future-proofs the runner for the June 2nd, 2026 Node.js 24 requirement
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    
    # Explicitly grants write access to the repository via the GITHUB_TOKEN
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Uses Node.js 24 compatible version

      - name: Set up Python
        uses: actions/setup-python@v5 # Uses Node.js 24 compatible version
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python job_poster.py

      - name: Save Job History
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Only add if the file exists (prevents error on first run)
          if [ -f job_history.json ]; then
            git add job_history.json
            git commit -m "Update job history [skip ci]" || echo "No changes to commit"
            
            # Authenticated push to solve Exit Code 128
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@://github.com{{ github.repository }}.git HEAD:${{ github.ref }}
          fi
