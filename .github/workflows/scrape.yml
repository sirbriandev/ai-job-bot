name: AI Job Scraper Automation

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch: # Allows you to click a button on GitHub to run it manually

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows GitHub to save the job_history.json file
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python job_poster.py

      - name: Save Job History
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add job_history.json
          git commit -m "Update job history [skip ci]" || echo "No changes to commit"
          git push
